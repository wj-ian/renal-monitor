.hbtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

.stab{padding:6px 16px;border-radius:30px;font-weight:600;border:none;background:transparent;font-size:12px;color:#475569}
.stab.on{background:white;color:#2563eb}
.grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:20px}

.card{background:white;border-radius:20px;padding:14px;border:1px solid #e2e8f0}
.chtit{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px;margin-bottom:6px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.ref{color:#64748b;font-size:10px;margin-bottom:8px}
.chbox{width:100%;overflow-x:auto}
canvas{min-width:500px;width:100%;height:auto;background:white;border-radius:8px}
.dlist{font-size:9px;color:#2563eb;padding:6px;background:#f8fafc;border-radius:12px;margin-top:8px;max-height:48px;overflow-y:auto;word-break:break-all}
.dlist span.clickable-date{display:inline-block;background:#e0f2fe;color:#0369a1;border-radius:12px;padding:2px 6px;margin:2px 2px;cursor:pointer;font-size:10px;transition:0.2s}
.dlist span.clickable-date:hover{background:#7c3aed;color:white}
.twrap{background:white;border-radius:20px;padding:12px;border:1px solid #e2e8f0;overflow-x:auto}
table{border-collapse:collapse;font-size:11px;min-width:800px;width:100%}
th{background:#f8fafc;padding:8px 4px;border-bottom:2px solid #cbd5e1;text-align:center}
td{padding:6px 4px;border-bottom:1px solid #e2e8f0;text-align:center}
input[type=date]{width:110px;padding:4px;border:1px solid #cbd5e1;border-radius:6px;font-size:11px}
input[type=text],input[type=number]{width:65px;padding:4px;border:1px solid #cbd5e1;border-radius:6px;text-align:center;font-size:11px}
.mi{width:75px}
.mi.st{background:#fee2e2;color:#b91c1c;text-decoration:line-through}
.dlbtn{background:#f1f5f9;border:1px solid #cbd5e1;border-radius:20px;padding:4px 10px;font-size:10px;cursor:pointer}
.wbtn{background:#c2410c;color:white;border:none;border-radius:20px;padding:5px 12px;font-size:11px}
.thdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ftr{text-align:center;margin:20px 0 10px;color:#64748b;font-size:10px}
.abtns{display:flex;gap:4px;justify-content:center}
.ibtn{background:#e0f2fe;color:#0369a1;border:none;border-radius:20px;padding:2px 8px;font-size:10px;cursor:pointer}
.dbtn{background:none;border:none;font-size:16px;cursor:pointer;color:#94a3b8;padding:2px 6px}
.chd{display:flex;flex-direction:column;align-items:center;gap:4px}
.bsm{background:#f1f5f9;color:#334155;border:1px solid #cbd5e1;padding:6px 14px;border-radius:30px;font-size:12px}

function bindCanvasWithDateLabels(canvas, dates, values, valueUnit, getPointCoords, redrawFunc) {
  let labelRects = [];
  let timeout = null;
  function clearHighlight() {
    if (timeout) clearTimeout(timeout);
    if (redrawFunc) redrawFunc();
  }
  function highlightPoint(idx) {
    if (redrawFunc) redrawFunc(idx);
    if (timeout) clearTimeout(timeout);
    timeout = setTimeout(() => { if (redrawFunc) redrawFunc(); }, 2000);
  }
  const handler = (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    let cx, cy;
    if (e.touches) {
      cx = e.touches[0].clientX;
      cy = e.touches[0].clientY;
      e.preventDefault();
    } else {
      cx = e.clientX;
      cy = e.clientY;
    }
    let canvasX = (cx - rect.left) * scaleX;
    let canvasY = (cy - rect.top) * scaleY;
    canvasX = Math.min(Math.max(canvasX, 0), canvas.width);
    canvasY = Math.min(Math.max(canvasY, 0), canvas.height);
    for (let r of labelRects) {
      if (canvasX >= r.x && canvasX <= r.x+r.w && canvasY >= r.y && canvasY <= r.y+r.h) {
        let idx = r.index;
        if (idx >= 0 && idx < dates.length) {
          alert(`${dates[idx]}\n数值: ${values[idx]} ${valueUnit}`);
          highlightPoint(idx);
        }
        return;
      }
    }
    let minDist = Infinity, bestIdx = -1;
    for (let i = 0; i < dates.length; i++) {
      let pc = getPointCoords(i);
      if (pc) {
        let dx = canvasX - pc.x, dy = canvasY - pc.y;
        let dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < minDist) { minDist = dist; bestIdx = i; }
      }
    }
    if (bestIdx !== -1 && minDist < 15) {
      alert(`${dates[bestIdx]}\n数值: ${values[bestIdx]} ${valueUnit}`);
      highlightPoint(bestIdx);
    }
  };
  canvas.addEventListener('click', handler);
  canvas.addEventListener('touchstart', handler);
  return { setLabelRects: (rects) => { labelRects = rects; }, highlightPoint, clearHighlight };
}

function drawIndicatorChart(ind, containerId){
  let pts = records.filter(r => r[ind.id]!==null && r[ind.id]!==undefined).map(r => ({date:r.date, value:r[ind.id]}));
  if(pts.length === 0) return;
  let card = document.createElement('div'); card.className = 'card';
  let cid = 'chart_'+ind.id;
  let dateListHtml = pts.map((p,i) => `<span class="clickable-date" data-idx="${i}">${fmtDate(p.date)}</span>`).join('');
  card.innerHTML = `<div class="chtit"><span class="dot" style="background:${ind.color}"></span>${ind.name} (${ind.unit}) <span style="font-size:10px">${pts.length}</span></div><div class="ref">参考: ${ind.range[0]}-${ind.range[1]}</div><div class="chbox"><canvas id="${cid}" width="600" height="200" style="width:100%;height:auto"></canvas></div><div class="dlist"><b>日期:</b> ${dateListHtml}</div><button class="dlbtn" onclick="downloadCanvas('${cid}','${ind.name}')" style="margin-top:6px">⬇️ 保存图片</button>`;
  document.getElementById(containerId).appendChild(card);
  let bindHelper = null;
  function redraw(highlightIdx = -1) {
    let cv = document.getElementById(cid);
    if(!cv) return;
    let ctx = cv.getContext('2d'), W=cv.width, H=cv.height;
    ctx.clearRect(0,0,W,H);
    let P = {l:40,r:20,t:30,b:55};
    let vals = pts.map(p=>p.value);
    let yMin = Math.floor(Math.min(...vals, ind.range[0])*0.9);
    let yMax = Math.ceil(Math.max(...vals, ind.range[1])*1.1);
    let yS = v => H-P.b - ((v-yMin)/(yMax-yMin))*(H-P.t-P.b);
    let xS = i => P.l + (i/(pts.length-1||1))*(W-P.l-P.r);
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0f172a'; ctx.font='bold 12px system-ui'; ctx.fillText(ind.name, P.l, 20);
    ctx.fillStyle = ind.color+'20';
    ctx.fillRect(P.l, yS(ind.range[1]), W-P.l-P.r, yS(ind.range[0])-yS(ind.range[1]));
    for(let i=0;i<=4;i++){ let v=yMin+(i/4)*(yMax-yMin), y=yS(v); ctx.beginPath(); ctx.moveTo(P.l,y); ctx.lineTo(W-P.r,y); ctx.strokeStyle='#e2e8f0'; ctx.stroke(); ctx.fillStyle='#64748b'; ctx.font='9px system-ui'; ctx.textAlign='right'; ctx.fillText(v.toFixed(0), P.l-5, y+3); }
    let labelRects = [];
    pts.forEach((p,i)=>{
      let x = xS(i);
      let text = fmtDate(p.date);
      ctx.save();
      ctx.translate(x, H-P.b+4);
      ctx.rotate(-Math.PI/4);
      ctx.fillStyle='#0f172a'; ctx.font='bold 7px system-ui'; ctx.textAlign='right';
      ctx.fillText(text, 0, 0);
      ctx.restore();
      let metrics = ctx.measureText(text);
      let w = metrics.width + 4, h = 10;
      labelRects.push({x: x - w/2, y: H-P.b, w: w, h: h, index: i});
    });
    ctx.beginPath(); ctx.moveTo(P.l, H-P.b); ctx.lineTo(W-P.r, H-P.b); ctx.strokeStyle = '#e2e8f0'; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(P.l, P.t); ctx.lineTo(P.l, H-P.b); ctx.strokeStyle = '#e2e8f0'; ctx.stroke();
    ctx.strokeStyle = ind.color; ctx.lineWidth=2;

// 修改后的 drawDrugChart：对于 losar, riva, indo 只从第一次有效用药开始绘图
function drawDrugChart(drugKey){
  let drug = drugs[drugKey];
  let all = records.map(r => ({date:r.date, value: r.meds && r.meds[drugKey] ? r.meds[drugKey] : ''}));
  
  // 针对氯沙坦钾、利伐沙班、吲哚布芬：找到第一次有数值（非空、非停用）的索引，裁剪 all
  if (drugKey === 'losar' || drugKey === 'riva' || drugKey === 'indo') {
    let firstIndex = -1;
    for (let i = 0; i < all.length; i++) {
      let v = all[i].value;
      if (v && v !== '' && v !== SU) {
        let m = v.match(/\d+(\.\d+)?/);
        if (m) {
          firstIndex = i;
          break;
        }
      }
    }
    if (firstIndex !== -1) {
      all = all.slice(firstIndex);
    } else {
      // 如果没有有效用药记录，则直接返回不绘图
      return;
    }
  }
  
  if (drugKey === 'ritu') {
    // 利妥昔单抗特殊处理：连接输液点，标注500mg，最后下降到停用
    let infusionPoints = [];
    for (let row of all) {
      let v = row.value;
      if (v && v !== '' && v !== SU) {
        let m = v.match(/\d+(\.\d+)?/);
        if (m) {
          let num = parseFloat(m[0]);
          infusionPoints.push({date: row.date, value: num, raw: v});
        }
      }
    }
    let stopPoint = null;
    for (let row of all) {
      if (row.value === SU) {
        stopPoint = {date: row.date, value: 0, raw: SU};
        break;
      }
    }
    if (infusionPoints.length === 0) return;
    
    let card = document.createElement('div'); card.className = 'card';
    let cid = 'chart_drug_'+drugKey;
    let dateListHtml = infusionPoints.map((p,i) => `<span class="clickable-date" data-idx="${i}">${fmtDate(p.date)}</span>`).join('');
    card.innerHTML = `<div class="chtit"><span class="dot" style="background:${drug.color}"></span>${drug.name}</div><div class="chbox"><canvas id="${cid}" width="600" height="200" style="width:100%;height:auto"></canvas></div><div class="dlist"><b>输液日期:</b> ${dateListHtml}</div><button class="dlbtn" onclick="downloadCanvas('${cid}','${drug.name}')" style="margin-top:6px">⬇️ 保存图片</button>`;
    document.getElementById('chartGrid').appendChild(card);
    let bindHelper = null;
    
    function redraw(highlightIdx = -1) {
      let cv = document.getElementById(cid);
      if(!cv) return;
      let ctx = cv.getContext('2d'), W=cv.width, H=cv.height;
      ctx.clearRect(0,0,W,H);
      let P = {l:40,r:20,t:30,b:55};
      let allVals = infusionPoints.map(p=>p.value);
      if (stopPoint) allVals.push(0);
      if (allVals.length === 0) return;
      let yMin = Math.max(0, Math.floor(Math.min(...allVals)*0.8));
      let yMax = Math.ceil(Math.max(...allVals)*1.2) || 10;
      let yS = v => H-P.b - ((v-yMin)/(yMax-yMin))*(H-P.t-P.b);
      let allDates = records.map(r=>r.date);
      let xMap = {};
      allDates.forEach((d, idx)=>{ xMap[d] = P.l + (idx/(allDates.length-1||1))*(W-P.l-P.r); });
      
      ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#0f172a'; ctx.font='bold 12px system-ui'; ctx.fillText(drug.name, P.l, 20);
      for(let i=0;i<=4;i++){ let v=yMin+(i/4)*(yMax-yMin), y=yS(v); ctx.beginPath(); ctx.moveTo(P.l,y); ctx.lineTo(W-P.r,y); ctx.strokeStyle='#e2e8f0'; ctx.stroke(); ctx.fillStyle='#64748b'; ctx.font='9px system-ui'; ctx.textAlign='right'; ctx.fillText(v.toFixed(0), P.l-5, y+3); }
      let labelRects = [];
      infusionPoints.forEach((p,i)=>{
        let x = xMap[p.date];
        let text = fmtDate(p.date);
        ctx.save();
        ctx.translate(x, H-P.b+4);
        ctx.rotate(-Math.PI/4);
        ctx.fillStyle='#0f172a'; ctx.font='bold 7px system-ui'; ctx.textAlign='right';
        ctx.fillText(text, 0, 0);
        ctx.restore();
        let metrics = ctx.measureText(text);
        let w = metrics.width + 4, h = 10;
        labelRects.push({x: x - w/2, y: H-P.b, w: w, h: h, index: i});
      });
      ctx.beginPath(); ctx.moveTo(P.l, H-P.b); ctx.lineTo(W-P.r, H-P.b); ctx.strokeStyle = '#e2e8f0'; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(P.l, P.t); ctx.lineTo(P.l, H-P.b); ctx.strokeStyle = '#e2e8f0'; ctx.stroke();
      
      if (infusionPoints.length > 1) {
        ctx.beginPath();
        ctx.strokeStyle = drug.color;
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        let first = infusionPoints[0];
        ctx.moveTo(xMap[first.date], yS(first.value));
        for (let i = 1; i < infusionPoints.length; i++) {
          let p = infusionPoints[i];
          ctx.lineTo(xMap[p.date], yS(p.value));
        }
        ctx.stroke();
      }
      if (infusionPoints.length >= 2) {
        let p1 = infusionPoints[0];
        let p2 = infusionPoints[infusionPoints.length-1];
        let x1 = xMap[p1.date];
        let x2 = xMap[p2.date];
        let midX = (x1 + x2) / 2;
        let yVal = yS(p1.value);
        ctx.fillStyle = drug.color;
        ctx.font = 'bold 11px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('500mg', midX, yVal - 12);
      } else if (infusionPoints.length === 1) {
        let p = infusionPoints[0];
        ctx.fillStyle = drug.color;
        ctx.font = 'bold 11px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(p.raw, xMap[p.date], yS(p.value) - 12);
      }
      
      infusionPoints.forEach((p, idx)=>{
        let x = xMap[p.date];
        let y = yS(p.value);
        let radius = (idx === highlightIdx) ? 8 : 5;
        ctx.beginPath(); ctx.arc(x, y, radius, 0, 2*Math.PI);
        ctx.fillStyle = drug.color;
        ctx.fill();
        if(idx === highlightIdx){
          ctx.strokeStyle='gold'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x, y, radius+1, 0, 2*Math.PI); ctx.stroke();
        }
      });
      
      if (stopPoint && infusionPoints.length > 0) {
        let lastInfusion = infusionPoints[infusionPoints.length-1];
        let xLast = xMap[lastInfusion.date];
        let yLast = yS(lastInfusion.value);
        let xStop = xMap[stopPoint.date];
        let yStop = yS(0);
        ctx.beginPath();
        ctx.strokeStyle = drug.color;
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.moveTo(xLast, yLast);
        ctx.lineTo(xStop, yLast);
        ctx.lineTo(xStop, yStop);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#b91c1c';
        ctx.beginPath(); ctx.arc(xStop, yStop, 5, 0, 2*Math.PI);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(xStop-3, yStop-3); ctx.lineTo(xStop+3, yStop+3);
        ctx.moveTo(xStop+3, yStop-3); ctx.lineTo(xStop-3, yStop+3);
        ctx.stroke();
        ctx.fillStyle = '#1e293b';
        ctx.font = 'bold 9px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('停用', xStop, yStop - 8);
      }
      
      if(bindHelper) bindHelper.setLabelRects(labelRects);
    }
    setTimeout(()=>{
      let cv = document.getElementById(cid);
      if(!cv) return;
      canvasCache[cid] = cv;
      function getPointCoords(i){
        let W=cv.width, H=cv.height;
        let P = {l:40,r:20,t:20,b:30};

        let allVals = infusionPoints.map(p=>p.value);
        if (stopPoint) allVals.push(0);
        if (allVals.length === 0) return null;
        let yMin = Math.max(0, Math.floor(Math.min(...allVals)*0.8));
        let yMax = Math.ceil(Math.max(...allVals)*1.2) || 10;
        let yS = v => H-P.b - ((v-yMin)/(yMax-yMin))*(H-P.t-P.b);
        let pt = infusionPoints[i];
        if(!pt) return null;
        return { x: xMap[pt.date], y: yS(pt.value) };
      }
      let dates = infusionPoints.map(p=>p.date);
      let values = infusionPoints.map(p=>p.value);
      bindHelper = bindCanvasWithDateLabels(cv, dates, values, 'mg', getPointCoords, redraw);
      redraw();
      let spans = card.querySelectorAll('.clickable-date');
      spans.forEach(span => {
        span.addEventListener('click', (e) => {
          e.stopPropagation();
          let idx = parseInt(span.getAttribute('data-idx'));
          if (!isNaN(idx)) {
            alert(`${infusionPoints[idx].date}\n剂量: ${infusionPoints[idx].raw}`);
            bindHelper.highlightPoint(idx);
          }
        });
      });
    }, 30);
    return;
  }
  
  // 其他药物（包括裁剪后的 losar, riva, indo）的原有阶梯图逻辑
  let filled = [];
  let lastVal = null;
  for(let row of all){
    let v = row.value;
    if(v && v !== ''){
      let m = v.match(/\d+(\.\d+)?/);
      if(m){
        lastVal = parseFloat(m[0]);
        filled.push({date:row.date, value:lastVal, raw:v});
      } else if(v === SU){
        lastVal = 0;
        filled.push({date:row.date, value:0, raw:SU});
      } else {
        filled.push({date:row.date, value:lastVal, raw: (lastVal!==null?lastVal+'mg':'')});
      }
    } else {
      filled.push({date:row.date, value:lastVal, raw: (lastVal!==null?lastVal+'mg':'')});
    }
  }
  let changePoints = [];
  let lastNum = null, lastRaw = null;
  for(let row of all){
    let v = row.value;
    if(v && v !== ''){
      let m = v.match(/\d+(\.\d+)?/);
      if(m){
        let num = parseFloat(m[0]);
        if(changePoints.length===0 || num !== lastNum){
          changePoints.push({date:row.date, value:num, raw:v, type:'value'});
          lastNum = num; lastRaw = v;

        if(changePoints.length===0 || (lastNum!==0 && lastRaw!==SU)){
          changePoints.push({date:row.date, value:0, raw:SU, type:'stop'});
          lastNum = 0; lastRaw = SU;
        }
      }

  }
  if(filled.length === 0) return;
  let card = document.createElement('div'); card.className = 'card';

    });
    ctx.beginPath(); ctx.moveTo(P.l, H-P.b); ctx.lineTo(W-P.r, H-P.b); ctx.strokeStyle = '#e2e8f0'; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(P.l, P.t); ctx.lineTo(P.l, H-P.b); ctx.strokeStyle = '#e2e8f0'; ctx.stroke();

        let ctx = cvW.getContext('2d'), W=cvW.width, H=cvW.height;
        ctx.clearRect(0,0,W,H);
        let P = {l:40,r:20,t:20,b:30};
        let vals = weightPts.map(p=>p.value);
        let yMin = Math.floor(Math.min(...vals)*0.98);
        let yMax = Math.ceil(Math.max(...vals)*1.02);
        let yS = v => H-P.b - ((v-yMin)/(yMax-yMin))*(H-P.t-P.b);
        let xS = i => P.l + (i/(weightPts.length-1||1))*(W-P.l-P.r);
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#0f172a'; ctx.font='bold 12px system-ui'; ctx.fillText('体重(kg)', P.l, 20);
        for(let i=0;i<=4;i++){ let v=yMin+(i/4)*(yMax-yMin), y=yS(v); ctx.beginPath(); ctx.moveTo(P.l,y); ctx.lineTo(W-P.r,y); ctx.strokeStyle='#e2e8f0'; ctx.stroke(); ctx.fillStyle='#64748b'; ctx.font='9px system-ui'; ctx.textAlign='right'; ctx.fillText(v.toFixed(1), P.l-5, y+3); }
        let firstDate = weightPts[0].date;
        let labelRects = [];
        weightPts.forEach((p,i)=>{
          let diff = daysDiff(firstDate, p.date);
          if(diff % 10 === 0 || i === weightPts.length-1){
            let x = xS(i);
            let text = fmtDate(p.date);
            ctx.fillStyle='#0f172a'; ctx.font='bold 7px system-ui'; ctx.textAlign='center';
            let metrics = ctx.measureText(text);
            let w = metrics.width+4, h=10, y = H-P.b+12;
            labelRects.push({x: x-w/2, y: y-5, w: w, h: h, index: i});
            ctx.fillText(text, x, y);
          }
        });
        ctx.beginPath(); ctx.moveTo(P.l, H-P.b); ctx.lineTo(W-P.r, H-P.b); ctx.strokeStyle='#e2e8f0'; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(P.l, P.t); ctx.lineTo(P.l, H-P.b); ctx.strokeStyle='#e2e8f0'; ctx.stroke();
        ctx.strokeStyle='#0891b2'; ctx.lineWidth=2; ctx.beginPath(); weightPts.forEach((p,i)=>{ let x=xS(i), y=yS(p.value); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.stroke();
        weightPts.forEach((p,i)=>{
          let x=xS(i), y=yS(p.value);
          let radius = (i===highlightIdx) ? 6 : 2.5;
          ctx.beginPath(); ctx.arc(x,y,radius,0,2*Math.PI); ctx.fillStyle='#0891b2'; ctx.fill();
          if(i===highlightIdx){ ctx.strokeStyle='gold'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,radius+1,0,2*Math.PI); ctx.stroke(); }
        });
        if(weightBind) weightBind.setLabelRects(labelRects);
      }
      let weightBind = bindCanvasWithDateLabels(cvW, weightPts.map(p=>p.date), weightPts.map(p=>p.value), 'kg',
        (i)=>{ let W=cvW.width, H=cvW.height, P={l:40,r:20,t:20,b:30}, xS = idx => P.l + (idx/(weightPts.length-1||1))*(W-P.l-P.r), vals=weightPts.map(p=>p.value), yMin=Math.floor(Math.min(...vals)*0.98), yMax=Math.ceil(Math.max(...vals)*1.02), yS=v=>H-P.b-((v-yMin)/(yMax-yMin))*(H-P.t-P.b); return {x:xS(i), y:yS(weightPts[i].value)}; }, redrawWeight);
      redrawWeight();
      let spans = weightCard.querySelectorAll('.clickable-date');
      spans.forEach(span => {
        span.addEventListener('click', (e) => {
          e.stopPropagation();
          let idx = parseInt(span.getAttribute('data-idx'));
          if (!isNaN(idx)) {
            alert(`${weightPts[idx].date}\n体重: ${weightPts[idx].value} kg`);
            weightBind.highlightPoint(idx);
          }
        });
      });
    }
    let cvBp = document.getElementById(bpcid);
    if(cvBp){
      function redrawBP(highlightIdx=-1){
        let ctx = cvBp.getContext('2d'), W=cvBp.width, H=cvBp.height;
        ctx.clearRect(0,0,W,H);
        let P = {l:40,r:20,t:20,b:30};
        let allVals = vitals.flatMap(v=>[v.sbp, v.dbp]);
        let yMin = Math.floor(Math.min(...allVals)*0.93);
        let yMax = Math.ceil(Math.max(...allVals)*1.05);
        let yS = v => H-P.b - ((v-yMin)/(yMax-yMin))*(H-P.t-P.b);
        let xS = i => P.l + (i/(vitals.length-1||1))*(W-P.l-P.r);
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#0f172a'; ctx.font='bold 12px system-ui'; ctx.fillText('血压趋势', P.l, 20);
        for(let i=0;i<=4;i++){ let v=yMin+(i/4)*(yMax-yMin), y=yS(v); ctx.beginPath(); ctx.moveTo(P.l,y); ctx.lineTo(W-P.r,y); ctx.strokeStyle='#e2e8f0'; ctx.stroke(); ctx.fillStyle='#64748b'; ctx.font='9px system-ui'; ctx.textAlign='right'; ctx.fillText(v.toFixed(0), P.l-5, y+3); }
        let firstDate = vitals[0].date;
        let labelRects = [];
        vitals.forEach((p,i)=>{
          let diff = daysDiff(firstDate, p.date);
          if(diff % 10 === 0 || i === vitals.length-1){
            let x = xS(i);
            let text = fmtDate(p.date);
            ctx.fillStyle='#0f172a'; ctx.font='bold 7px system-ui'; ctx.textAlign='center';
            let metrics = ctx.measureText(text);
            let w = metrics.width+4, h=10, y = H-P.b+12;
            labelRects.push({x: x-w/2, y: y-5, w: w, h: h, index: i});
            ctx.fillText(text, x, y);
          }
        });
        ctx.beginPath(); ctx.moveTo(P.l, H-P.b); ctx.lineTo(W-P.r, H-P.b); ctx.strokeStyle='#e2e8f0'; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(P.l, P.t); ctx.lineTo(P.l, H-P.b); ctx.strokeStyle='#e2e8f0'; ctx.stroke();
        ctx.strokeStyle='#dc2626'; ctx.lineWidth=2; ctx.beginPath(); vitals.forEach((p,i)=>{ let x=xS(i), y=yS(p.sbp); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.stroke();
        ctx.strokeStyle='#059669'; ctx.lineWidth=2; ctx.beginPath(); vitals.forEach((p,i)=>{ let x=xS(i), y=yS(p.dbp); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.stroke();
        vitals.forEach((p,i)=>{
          let x = xS(i);
          let r1 = (i===highlightIdx) ? 5 : 2.5;
          ctx.beginPath(); ctx.arc(x, yS(p.sbp), r1, 0, 2*Math.PI); ctx.fillStyle='#dc2626'; ctx.fill();
          ctx.beginPath(); ctx.arc(x, yS(p.dbp), r1, 0, 2*Math.PI); ctx.fillStyle='#059669'; ctx.fill();
          if(i===highlightIdx){
            ctx.strokeStyle='gold'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x, yS(p.sbp), r1+1, 0, 2*Math.PI); ctx.stroke();
            ctx.beginPath(); ctx.arc(x, yS(p.dbp), r1+1, 0, 2*Math.PI); ctx.stroke();
          }
        });
        if(bpBind) bpBind.setLabelRects(labelRects);
      }
      let bpBind = bindCanvasWithDateLabels(cvBp, vitals.map(v=>v.date), vitals.map(v=>`${v.sbp}/${v.dbp}`), 'mmHg',
        (i)=>{ let W=cvBp.width, H=cvBp.height, P={l:40,r:20,t:20,b:30}, xS = idx => P.l + (idx/(vitals.length-1||1))*(W-P.l-P.r), allVals=vitals.flatMap(v=>[v.sbp,v.dbp]), yMin=Math.floor(Math.min(...allVals)*0.93), yMax=Math.ceil(Math.max(...allVals)*1.05), yS=v=>H-P.b-((v-yMin)/(yMax-yMin))*(H-P.t-P.b); return {x:xS(i), y:yS(vitals[i].sbp)}; }, redrawBP);
      redrawBP();
      let spans = bpCard.querySelectorAll('.clickable-date');
      spans.forEach(span => {
        span.addEventListener('click', (e) => {
          e.stopPropagation();
          let idx = parseInt(span.getAttribute('data-idx'));
          if (!isNaN(idx)) {
            alert(`${vitals[idx].date}\n收缩压: ${vitals[idx].sbp} mmHg\n舒张压: ${vitals[idx].dbp} mmHg`);
            bpBind.highlightPoint(idx);
          }
        });
      });
    }
  }, 50);
}

function switchSubTab(type){
  currentSubTab = type;
  document.querySelectorAll('.stab').forEach(btn => btn.classList.remove('on'));
  if(type==='ind') document.getElementById('subIndChart').classList.add('on');
  else if(type==='med') document.getElementById('subMedChart').classList.add('on');
  else document.getElementById('subVitChart').classList.add('on');

  else if(type==='med') renderDrugCharts();
  else renderVitalCharts();
}
function switchMainTab(tab){
  document.getElementById('panelChart').style.display = (tab==='chart')?'block':'none';
  document.getElementById('panelIndicators').style.display = (tab==='indicators')?'block':'none';
  document.getElementById('panelMeds').style.display = (tab==='meds')?'block':'none';
  document.getElementById('panelVitals').style.display = (tab==='vitals')?'block':'none';
  document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('on'));
  if(tab==='chart') document.getElementById('tabChart').classList.add('on');
  else if(tab==='indicators') document.getElementById('tabIndicators').classList.add('on');

}

function generateIndicatorTableHTML() {
  let html = `<!DOCTYPE html>

  <style>
    body { font-family: '宋体', 'Segoe UI', Arial, sans-serif; margin: 20px; }
    h1 { color: #0f172a; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid #9ca3af; padding: 8px 6px; text-align: center; vertical-align: top; }
    th { background-color: #f1f5f9; font-weight: bold; }
    td { background-color: #ffffff; }
  </style>

  </head>
  <body>
  <h1>王坚 · 肾病指标记录表</h1>
  <p>生成时间：${new Date().toLocaleString()}</p>
  <table>
    <thead><tr><th>日期</th><th>周次</th>`;
  indicators.forEach(ind => { html += `<th>${ind.name}<br><span style="font-weight:normal">(${ind.unit})</span></th>`; });
  html += `</thead><tbody>`;
  records.forEach(r => {
    html += `<tr><td>${r.date}</td><td>${r.week || '-'}</td>`;
    indicators.forEach(ind => {
      let val = (r[ind.id] !== undefined && r[ind.id] !== null) ? r[ind.id] : '-';
      html += `<td>${val}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></body></html>`;
  return html;
}

function generateDrugTableHTML() {
let drugKeys = Object.keys(drugs);
let html = `<!DOCTYPE html>
  <html>
  <head><meta charset="UTF-8"><title>用药记录表</title>
  <style>
    body { font-family: '宋体', 'Segoe UI', Arial, sans-serif; margin: 20px; }
    h1 { color: #0f172a; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid #9ca3af; padding: 8px 6px; text-align: center; vertical-align: top; }
    th { background-color: #f1f5f9; font-weight: bold; }
    td { background-color: #ffffff; }
  </style>
  </head>
  <body>
  <h1>王坚 · 肾病用药记录表</h1>
  <p>生成时间：${new Date().toLocaleString()}</p>
  <table>
    <thead><tr><th>日期</th><th>周次</th>`;
  drugKeys.forEach(key => { html += `<th>${drugs[key].name}</th>`; });
  html += `</tr></thead><tbody>`;
  records.forEach(r => {
    html += `<tr><td>${r.date}</td><td>${r.week || '-'}</td>`;
    drugKeys.forEach(key => {
      let val = (r.meds && r.meds[key]) ? r.meds[key] : '';

  });
  html += `</tbody></table></body></html>`;
  return html;
}

// ***** 彻底修复导出HTML功能：直接基于当前内存数据生成新HTML，不使用正则替换，避免遗漏 *****
window.exportHTML = function() {
  // 获取当前页面的完整 HTML 字符串
  let htmlContent = document.documentElement.outerHTML;
  
  // 序列化当前数据
  let newInitData = JSON.stringify(records);
  let newVitals = JSON.stringify(vitals);
  let newDrugs = JSON.stringify(drugs);
  let newIndicators = JSON.stringify(indicators);
  
  // 使用更精确的替换：找到 let INIT_DATA = 的定义并替换
  // 注意：因为数组内容可能跨行，使用正则匹配从 "let INIT_DATA = [" 到对应的 "];"
  // 但为了简单可靠，直接查找并替换整段
  htmlContent = htmlContent.replace(
    /let INIT_DATA = \[[\s\S]*?\];(?=\s+let VITALS =)/,
    `let INIT_DATA = ${newInitData};`
  );
  htmlContent = htmlContent.replace(
    /let VITALS = \[[\s\S]*?\];(?=\s+let records =)/,
    `let VITALS = ${newVitals};`
  );
  htmlContent = htmlContent.replace(
    /let DRUGS = \{[\s\S]*?\};(?=\s+let INIT_DATA =)/,
    `let DRUGS = ${newDrugs};`
  );
  htmlContent = htmlContent.replace(
    /let INDICATORS = \[[\s\S]*?\];(?=\s+let DRUGS =)/,
    `let INDICATORS = ${newIndicators};`
  );
  
  // 生成唯一文件名
  let now = new Date();
  let timestamp = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}_${now.getHours()}-${now.getMinutes()}-${now.getSeconds()}`;
  let filename = `肾病监测_${timestamp}.html`;
  
  let blob = new Blob([htmlContent], { type: 'text/html' });
  let a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
};
