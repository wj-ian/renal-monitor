    points.forEach((p, i) => { const x = xS(i); ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x,H-P.b); ctx.lineTo(x,H-P.b+4); ctx.stroke(); ctx.fillStyle='#0f172a'; ctx.font='bold 8px system-ui'; ctx.textAlign='center'; ctx.fillText(formatDateMMDD(p.date),x,H-P.b+14); });
    ctx.strokeStyle='#0f172a'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(P.l,H-P.b); ctx.lineTo(W-P.r,H-P.b); ctx.stroke(); ctx.beginPath(); ctx.moveTo(P.l,P.t); ctx.lineTo(P.l,H-P.b); ctx.stroke();
