<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const firebaseConfig = {
        apiKey: "AIzaSyDmfqE29qZFB9g126tWxomltJHEZhoEBDI",
        authDomain: "renal-monitor-bee0f.firebaseapp.com",
        projectId: "renal-monitor-bee0f",
        storageBucket: "renal-monitor-bee0f.firebasestorage.app",
        messagingSenderId: "827066206331",
        appId: "1:827066206331:web:062a352a8fb567f9c8bade"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "renal", "wangjian");
    window._docRef = docRef;
    window._setDoc = setDoc;

    onSnapshot(docRef, (snapshot) => {
        const statusEl = document.getElementById('syncStatus');
        if (snapshot.exists()) {
            const cloudData = snapshot.data();
            if (cloudData.data) data = cloudData.data;
            if (cloudData.CONFIG_MED) CONFIG_MED = cloudData.CONFIG_MED;
            renderTableHeaders(); renderTables(); renderChartsByType(currentChartType);
            statusEl.className = 'sync-status synced'; statusEl.textContent = '☁️ 已同步';
        } else {
            saveToCloud();
            statusEl.className = 'sync-status synced'; statusEl.textContent = '☁️ 初始化完成';
        }
    }, (error) => {
        const statusEl = document.getElementById('syncStatus');
        statusEl.className = 'sync-status error'; statusEl.textContent = '❌ 同步失败';
    });

    window.saveToCloud = async function() {
        const statusEl = document.getElementById('syncStatus');
        statusEl.className = 'sync-status syncing'; statusEl.textContent = '⏳ 同步中...';
        try {
            await setDoc(docRef, {
                data: data, CONFIG_MED: CONFIG_MED,
                CONFIG_IND: CONFIG_IND.map(c => ({id:c.id,name:c.name,unit:c.unit,range:c.range,color:c.color})),
                updatedAt: new Date().toISOString()
            });
            statusEl.className = 'sync-status synced'; statusEl.textContent = '☁️ 已同步';
        } catch(e) {
            statusEl.className = 'sync-status error'; statusEl.textContent = '❌ 同步失败';
        }
    };
</script>

        pts.forEach((p,i)=>{const x=xS(i);ctx.strokeStyle='#cbd5e1';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,H-P.b);ctx.lineTo(x,H-P.b+4);ctx.stroke();ctx.fillStyle='#0f172a';ctx.font='bold 8px system-ui';ctx.textAlign='center';ctx.fillText(fmt(p.date),x,H-P.b+14);});
        ctx.strokeStyle='#0f172a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(P.l,H-P.b);ctx.lineTo(W-P.r,H-P.b);ctx.stroke();ctx.beginPath();ctx.moveTo(P.l,P.t);ctx.lineTo(P.l,H-P.b);ctx.stroke();
        ctx.strokeStyle=cfg.color;ctx.lineWidth=2.5;ctx.beginPath();pts.forEach((p,i)=>{const x=xS(i),y=yS(p.value);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
        pts.forEach((p,i)=>{const x=xS(i),y=yS(p.value);ctx.shadowColor=cfg.color;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fillStyle=cfg.color;ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();});

    function drawMedChart(medKey,mn,mc,sp,allRows,id) {
        const cv=document.getElementById(id);if(!cv)return;

        const vals=sp.map(p=>p.value);
        const yMin=Math.max(0,Math.floor(Math.min(...vals)*0.8)),yMax=Math.ceil(Math.max(...vals)*1.2)||10;
        const yS=v=>H-P.b-((v-yMin)/(yMax-yMin))*(H-P.t-P.b);
        const xPos={};allRows.forEach((r,i)=>{xPos[r.date]=P.l+(i/(allRows.length-1||1))*(W-P.l-P.r);});

        ctx.fillStyle='#0f172a';ctx.font='bold 14px system-ui';ctx.textAlign='left';ctx.fillText(`${mn} 用量趋势`,P.l,22);
        for(let i=0;i<=4;i++){const v=yMin+(i/4)*(yMax-yMin),y=yS(v);ctx.strokeStyle='#e2e8f0';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();ctx.fillStyle='#64748b';ctx.font='9px system-ui';ctx.textAlign='right';ctx.fillText(v.toFixed(0),P.l-5,y+3);}

        ctx.strokeStyle='#0f172a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(P.l,H-P.b);ctx.lineTo(W-P.r,H-P.b);ctx.stroke();ctx.beginPath();ctx.moveTo(P.l,P.t);ctx.lineTo(P.l,H-P.b);ctx.stroke();
        if(sp.length>1){for(let i=0;i<sp.length-1;i++){const p1=sp[i],p2=sp[i+1],x1=xPos[p1.date],y1=yS(p1.value),x2=xPos[p2.date],y2=yS(p2.value);ctx.beginPath();if(p1.type==='stop'||p2.type==='stop'){ctx.setLineDash([5,3]);ctx.lineWidth=2;}else{ctx.setLineDash([]);ctx.lineWidth=2.5;}ctx.strokeStyle=mc;ctx.moveTo(x1,y1);ctx.lineTo(x2,y1);ctx.lineTo(x2,y2);ctx.stroke();}ctx.setLineDash([]);}
        sp.forEach(p=>{const x=xPos[p.date],y=yS(p.value);if(p.type==='stop'){ctx.fillStyle='#b91c1c';ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();ctx.beginPath();ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.moveTo(x-3,y-3);ctx.lineTo(x+3,y+3);ctx.moveTo(x+3,y-3);ctx.lineTo(x-3,y+3);ctx.stroke();}else if(p.type==='extension'){ctx.fillStyle='#94a3b8';ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();}else{ctx.shadowColor=mc;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fillStyle=mc;ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();}ctx.fillStyle=p.type==='extension'?'#64748b':(p.type==='stop'?'#b91c1c':'#1e293b');ctx.font=p.type==='extension'?'7px system-ui':'bold 7px system-ui';ctx.textAlign='center';ctx.fillText(p.rawValue,x,y-12);});
