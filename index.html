<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:#f1f5f9;padding:10px}
.hdr{background:white;padding:12px 16px;border-radius:24px;margin-bottom:16px;border:1px solid #e2e8f0;display:flex;flex-direction:column;gap:12px}
.ttl{font-size:18px;font-weight:800;background:linear-gradient(135deg,#0f172a,#2563eb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bdg{background:#dbeafe;color:#1e40af;padding:4px 10px;border-radius:40px;font-size:11px;font-weight:600;margin-left:8px}
.btn{background:#0f172a;color:white;border:none;padding:10px 20px;border-radius:40px;font-weight:600;font-size:14px;cursor:pointer}
.hbtns{display:flex;gap:8px;flex-wrap:wrap}
.tabs{display:flex;gap:4px;background:#e2e8f0;padding:4px;border-radius:40px;margin-bottom:16px}
.tab{flex:1;padding:10px 0;border-radius:40px;font-weight:700;border:none;background:transparent;cursor:pointer;font-size:13px;color:#475569;text-align:center}
.tab.on{background:white;color:#2563eb;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:20px}
@media(min-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{background:white;border-radius:20px;padding:16px;border:1px solid #e2e8f0}
.chtit{font-size:15px;font-weight:800;display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.ref{color:#64748b;font-size:11px}
.chbox{height:220px;overflow-x:auto;overflow-y:hidden;margin-bottom:8px}
canvas{min-width:400px;display:block}
.dlist{font-size:10px;color:#2563eb;padding:6px 10px;background:#f8fafc;border-radius:16px;max-height:50px;overflow-y:auto;word-break:break-all}
.twrap{background:white;border-radius:20px;padding:16px;border:1px solid #e2e8f0;overflow-x:auto}
table{border-collapse:collapse;font-size:11px;min-width:1200px;width:100%}
th{background:#f8fafc;padding:10px 4px;font-weight:700;color:#1e293b;border-bottom:2px solid #cbd5e1;text-align:center}
td{padding:6px 4px;border-bottom:1px solid #e2e8f0;text-align:center}
.dlbtn{background:#f1f5f9;border:1px solid #cbd5e1;border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer}
.wbtn{background:#c2410c;color:white;border:none;border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer}
.stabs{display:flex;gap:4px;background:#e2e8f0;padding:4px;border-radius:40px;width:fit-content;margin-bottom:16px}
.stab{padding:6px 16px;border-radius:30px;font-weight:600;border:none;background:transparent;cursor:pointer;font-size:12px;color:#475569}
.stab.on{background:white;color:#2563eb}
.thdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ftr{text-align:center;margin:20px 0 10px;color:#64748b;font-size:11px}
</style>
</head>

var cvs={},ctype='ind';

function fmt(d){if(!d)return'';var p=d.split('-');return p.length>=3?p[1]+'-'+p[2]:d;}

function renderCharts(type){
  var g=document.getElementById('chartsGrid');
  g.innerHTML='';
  if(type==='ind') IND.forEach(function(c){renderInd(c);});
  else Object.keys(MED).forEach(function(k){renderMed(k);});
}

function renderInd(cfg){
  var g=document.getElementById('chartsGrid');
  var card=document.createElement('div');card.className='card';
  var pts=D.filter(function(d){return d[cfg.id]!==null&&d[cfg.id]!==undefined;}).map(function(d){return{date:d.date,value:d[cfg.id]};});
  var id='c-'+cfg.id;
  var dstr=pts.map(function(p){return fmt(p.date);}).join(' \u00b7 ');
  card.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><div><div class="chtit"><span class="dot" style="background:'+cfg.color+'"></span>'+cfg.name+' ('+cfg.unit+') <span style="font-size:10px;color:#2563eb">'+pts.length+'</span></div><div class="ref">\u53c2\u8003: '+cfg.range[0]+'-'+cfg.range[1]+'</div></div><button class="dlbtn" onclick="dlInd(\''+cfg.id+'\')">\u2b07\ufe0f \u4e0b\u8f7d</button></div><div class="chbox"><canvas id="'+id+'" width="600" height="220"></canvas></div><div class="dlist"><b>\u65e5\u671f:</b> '+dstr+'</div>';
  g.appendChild(card);
  setTimeout(function(){drawInd(cfg,pts,id);},10);
}

function drawInd(cfg,pts,id){
  var cv=document.getElementById(id);if(!cv)return;
  cvs['i-'+cfg.id]=cv;
  var ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  var P={l:50,r:20,t:30,b:35};
  if(!pts.length){ctx.fillStyle='#64748b';ctx.font='14px system-ui';ctx.textAlign='center';ctx.fillText('\u6682\u65e0\u6570\u636e',W/2,H/2);return;}
  var vals=pts.map(function(p){return p.value;});
  var yMin=Math.floor(Math.min.apply(null,vals.concat([cfg.range[0]]))*0.9);
  var yMax=Math.ceil(Math.max.apply(null,vals.concat([cfg.range[1]]))*1.1);
  function yS(v){return H-P.b-((v-yMin)/(yMax-yMin))*(H-P.t-P.b);}
  function xS(i){return P.l+(i/(pts.length-1||1))*(W-P.l-P.r);}
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#0f172a';ctx.font='bold 13px system-ui';ctx.textAlign='left';ctx.fillText(cfg.name,P.l,22);
  ctx.fillStyle=cfg.color+'20';ctx.fillRect(P.l,yS(cfg.range[1]),W-P.l-P.r,yS(cfg.range[0])-yS(cfg.range[1]));
  for(var i=0;i<=4;i++){var v=yMin+(i/4)*(yMax-yMin),y=yS(v);ctx.strokeStyle='#e2e8f0';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();ctx.fillStyle='#64748b';ctx.font='9px system-ui';ctx.textAlign='right';ctx.fillText(v.toFixed(0),P.l-5,y+3);}
  pts.forEach(function(p,i){var x=xS(i);ctx.strokeStyle='#cbd5e1';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,H-P.b);ctx.lineTo(x,H-P.b+4);ctx.stroke();ctx.fillStyle='#0f172a';ctx.font='bold 8px system-ui';ctx.textAlign='center';ctx.fillText(fmt(p.date),x,H-P.b+14);});
  ctx.strokeStyle='#0f172a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(P.l,H-P.b);ctx.lineTo(W-P.r,H-P.b);ctx.stroke();ctx.beginPath();ctx.moveTo(P.l,P.t);ctx.lineTo(P.l,H-P.b);ctx.stroke();
  ctx.strokeStyle=cfg.color;ctx.lineWidth=2.5;ctx.beginPath();pts.forEach(function(p,i){var x=xS(i),y=yS(p.value);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
  pts.forEach(function(p,i){var x=xS(i),y=yS(p.value);ctx.shadowColor=cfg.color;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fillStyle=cfg.color;ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();});
}

function renderMed(k){
  var g=document.getElementById('chartsGrid');
  var card=document.createElement('div');card.className='card';
  var mn=MED[k].name,mc=MED[k].color;
  var all=D.map(function(d){return{date:d.date,value:d.meds&&d.meds[k]?d.meds[k]:''}; });
  var sp=[],lv=null,lr=null,ld=null;
  all.forEach(function(row){var v=row.value;if(v&&v!==''){var m=v.match(/\d+(\.\d+)?/);if(m){sp.push({date:row.date,value:parseFloat(m[0]),rawValue:v,type:'value'});lv=parseFloat(m[0]);lr=v;ld=row.date;}else if(v==='\u505c\u7528'){sp.push({date:row.date,value:0,rawValue:'\u505c\u7528',type:'stop'});lv=null;}}});
  var last=all[all.length-1];
  if(lv!==null&&last.value!=='\u505c\u7528')sp.push({date:last.date,value:lv,rawValue:ld===last.date?lr:lr,type:ld===last.date?'value':'extension'});
  var u=[],s={};for(var i=sp.length-1;i>=0;i--){if(!s[sp[i].date]){u.unshift(sp[i]);s[sp[i].date]=1;}}
  var id='m-'+k;
  var dstr=u.map(function(p){return fmt(p.date);}).join(' \u00b7 ');
  card.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px"><div><div class="chtit"><span class="dot" style="background:'+mc+'"></span>'+mn+' <span style="font-size:10px;color:#2563eb">'+u.length+'</span></div></div><button class="dlbtn" onclick="dlMed(\''+k+'\')">\u2b07\ufe0f \u4e0b\u8f7d</button></div><div class="chbox"><canvas id="'+id+'" width="600" height="220"></canvas></div><div class="dlist"><b>\u65e5\u671f:</b> '+dstr+'</div>';
  g.appendChild(card);
  setTimeout(function(){drawMed(mn,mc,u,all,id);},10);
}

function drawMed(mn,mc,sp,all,id){
  var cv=document.getElementById(id);if(!cv)return;
  cvs[id]=cv;
  var ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  var P={l:50,r:20,t:30,b:35};
  if(!sp.length){ctx.fillStyle='#64748b';ctx.font='14px system-ui';ctx.textAlign='center';ctx.fillText('\u6682\u65e0\u6570\u636e',W/2,H/2);return;}
  var vals=sp.map(function(p){return p.value;});
  var yMin=Math.max(0,Math.floor(Math.min.apply(null,vals)*0.8));
  var yMax=Math.ceil(Math.max.apply(null,vals)*1.2)||10;
  function yS(v){return H-P.b-((v-yMin)/(yMax-yMin))*(H-P.t-P.b);}
  var xp={};all.forEach(function(r,i){xp[r.date]=P.l+(i/(all.length-1||1))*(W-P.l-P.r);});
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#0f172a';ctx.font='bold 13px system-ui';ctx.textAlign='left';ctx.fillText(mn,P.l,22);
  for(var i=0;i<=4;i++){var v=yMin+(i/4)*(yMax-yMin),y=yS(v);ctx.strokeStyle='#e2e8f0';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();ctx.fillStyle='#64748b';ctx.font='9px system-ui';ctx.textAlign='right';ctx.fillText(v.toFixed(0),P.l-5,y+3);}
  sp.forEach(function(p){var x=xp[p.date];ctx.strokeStyle='#cbd5e1';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,H-P.b);ctx.lineTo(x,H-P.b+4);ctx.stroke();ctx.fillStyle='#0f172a';ctx.font='bold 8px system-ui';ctx.textAlign='center';ctx.fillText(fmt(p.date),x,H-P.b+14);});
  ctx.strokeStyle='#0f172a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(P.l,H-P.b);ctx.lineTo(W-P.r,H-P.b);ctx.stroke();ctx.beginPath();ctx.moveTo(P.l,P.t);ctx.lineTo(P.l,H-P.b);ctx.stroke();
  if(sp.length>1){for(var i=0;i<sp.length-1;i++){var p1=sp[i],p2=sp[i+1],x1=xp[p1.date],y1=yS(p1.value),x2=xp[p2.date],y2=yS(p2.value);ctx.beginPath();if(p1.type==='stop'||p2.type==='stop'){ctx.setLineDash([5,3]);ctx.lineWidth=2;}else{ctx.setLineDash([]);ctx.lineWidth=2.5;}ctx.strokeStyle=mc;ctx.moveTo(x1,y1);ctx.lineTo(x2,y1);ctx.lineTo(x2,y2);ctx.stroke();}ctx.setLineDash([]);}
  sp.forEach(function(p){var x=xp[p.date],y=yS(p.value);if(p.type==='stop'){ctx.fillStyle='#b91c1c';ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();ctx.beginPath();ctx.strokeStyle='white';ctx.moveTo(x-3,y-3);ctx.lineTo(x+3,y+3);ctx.moveTo(x+3,y-3);ctx.lineTo(x-3,y+3);ctx.stroke();}else if(p.type==='extension'){ctx.fillStyle='#94a3b8';ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();}else{ctx.shadowColor=mc;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fillStyle=mc;ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();}ctx.fillStyle=p.type==='extension'?'#64748b':(p.type==='stop'?'#b91c1c':'#1e293b');ctx.font='bold 7px system-ui';ctx.textAlign='center';ctx.fillText(p.rawValue,x,y-12);});
}
