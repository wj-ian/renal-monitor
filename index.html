const chartCanvases = {};
let currentChartType = 'ind';

function fmt(d){if(!d)return'';const p=d.split('-');return p.length>=3?`${p[1]}-${p[2]}`:d;}

function renderChartsByType(type){
    const grid=document.getElementById('chartsGrid');
    if(!grid)return;
    grid.innerHTML='';
    if(type==='ind')CONFIG_IND.forEach(cfg=>renderIndChart(cfg));
    else Object.keys(CONFIG_MED).forEach(k=>renderMedChart(k));
}

function renderIndChart(cfg){
    const grid=document.getElementById('chartsGrid');
    const card=document.createElement('div');card.className='chart-card';
    const pts=data.filter(d=>d[cfg.id]!==null&&d[cfg.id]!==undefined).map(d=>({date:d.date,value:d[cfg.id]}));
    const id=`chart-${cfg.id}`;
    card.innerHTML=`<div class="chart-header"><div><div class="chart-title"><span class="color-dot" style="background:${cfg.color}"></span>${cfg.name} (${cfg.unit})<span style="font-size:10px;color:#2563eb;margin-left:4px;">${pts.length}个点</span></div><div class="ref-range">参考: ${cfg.range[0]}-${cfg.range[1]}</div></div><button class="download-btn" onclick="downloadIndChart('${cfg.id}')">⬇️ 下载</button></div><div class="chart-container"><canvas id="${id}" width="600" height="220"></canvas></div><div class="date-list"><strong>日期:</strong> ${pts.map(p=>fmt(p.date)).join(' · ')}</div>`;
    grid.appendChild(card);
    setTimeout(()=>drawIndChart(cfg,pts,id),10);
}

function drawIndChart(cfg,pts,id){
    const cv=document.getElementById(id);if(!cv)return;
    chartCanvases[`ind-${cfg.id}`]=cv;
    const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
    ctx.clearRect(0,0,W,H);
    const P={l:50,r:20,t:30,b:35};
    if(!pts.length){ctx.fillStyle='#64748b';ctx.font='14px system-ui';ctx.textAlign='center';ctx.fillText('暂无数据',W/2,H/2);return;}
    const vals=pts.map(p=>p.value);
    const yMin=Math.floor(Math.min(...vals,cfg.range[0])*0.9),yMax=Math.ceil(Math.max(...vals,cfg.range[1])*1.1);
    const yS=v=>H-P.b-((v-yMin)/(yMax-yMin))*(H-P.t-P.b);
    const xS=i=>P.l+(i/(pts.length-1||1))*(W-P.l-P.r);
    ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0f172a';ctx.font='bold 14px system-ui';ctx.textAlign='left';ctx.fillText(`${cfg.name} 趋势`,P.l,22);
    ctx.fillStyle=cfg.color+'20';ctx.fillRect(P.l,yS(cfg.range[1]),W-P.l-P.r,yS(cfg.range[0])-yS(cfg.range[1]));
    for(let i=0;i<=4;i++){const v=yMin+(i/4)*(yMax-yMin),y=yS(v);ctx.strokeStyle='#e2e8f0';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();ctx.fillStyle='#64748b';ctx.font='9px system-ui';ctx.textAlign='right';ctx.fillText(v.toFixed(0),P.l-5,y+3);}
    pts.forEach((p,i)=>{const x=xS(i);ctx.strokeStyle='#cbd5e1';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,H-P.b);ctx.lineTo(x,H-P.b+4);ctx.stroke();ctx.fillStyle='#0f172a';ctx.font='bold 8px system-ui';ctx.textAlign='center';ctx.fillText(fmt(p.date),x,H-P.b+14);});
    ctx.strokeStyle='#0f172a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(P.l,H-P.b);ctx.lineTo(W-P.r,H-P.b);ctx.stroke();ctx.beginPath();ctx.moveTo(P.l,P.t);ctx.lineTo(P.l,H-P.b);ctx.stroke();
    ctx.strokeStyle=cfg.color;ctx.lineWidth=2.5;ctx.beginPath();pts.forEach((p,i)=>{const x=xS(i),y=yS(p.value);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();
    pts.forEach((p,i)=>{const x=xS(i),y=yS(p.value);ctx.shadowColor=cfg.color;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fillStyle=cfg.color;ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();});
}

function renderMedChart(medKey){

    const mn=CONFIG_MED[medKey].name,mc=CONFIG_MED[medKey].color;
    const allRows=data.map(d=>({date:d.date,value:d.meds?.[medKey]||''}));
    const sp=[];let lv=null,lr=null,ld=null;
    allRows.forEach(row=>{const v=row.value;if(v&&v!==''){const m=v.match(/\d+(\.\d+)?/);if(m){sp.push({date:row.date,value:parseFloat(m[0]),rawValue:v,type:'value'});lv=parseFloat(m[0]);lr=v;ld=row.date;}else if(v==='停用'){sp.push({date:row.date,value:0,rawValue:'停用',type:'stop'});lv=null;}}});
    const last=allRows[allRows.length-1];
    if(lv!==null&&last.value!=='停用')sp.push({date:last.date,value:lv,rawValue:ld===last.date?lr:'↳'+lr,type:ld===last.date?'value':'extension'});
    const u=[],s=new Set();for(let i=sp.length-1;i>=0;i--){if(!s.has(sp[i].date)){u.unshift(sp[i]);s.add(sp[i].date);}}
    const id=`med-chart-${medKey}`;
    card.innerHTML=`<div class="chart-header"><div><div class="chart-title"><span class="color-dot" style="background:${mc}"></span>${mn} 用量趋势<span style="font-size:10px;color:#2563eb;margin-left:4px;">${u.length}个点</span></div><div class="ref-range">红色叉=停用·灰色=延续</div></div><button class="download-btn" onclick="downloadMedChart('${medKey}')">⬇️ 下载</button></div><div class="chart-container"><canvas id="${id}" width="600" height="220"></canvas></div><div class="date-list"><strong>日期:</strong> ${u.map(p=>fmt(p.date)).join(' · ')}</div>`;
    grid.appendChild(card);
    setTimeout(()=>drawMedChart(mn,mc,u,allRows,id),10);
}

function drawMedChart(mn,mc,sp,allRows,id){
    const cv=document.getElementById(id);if(!cv)return;
    chartCanvases[id]=cv;
    const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
    ctx.clearRect(0,0,W,H);
    const P={l:50,r:20,t:30,b:35};
    if(!sp.length){ctx.fillStyle='#64748b';ctx.font='14px system-ui';ctx.textAlign='center';ctx.fillText('暂无数据',W/2,H/2);return;}
    const vals=sp.map(p=>p.value);
    const yMin=Math.max(0,Math.floor(Math.min(...vals)*0.8)),yMax=Math.ceil(Math.max(...vals)*1.2)||10;
    const yS=v=>H-P.b-((v-yMin)/(yMax-yMin))*(H-P.t-P.b);
    const xPos={};allRows.forEach((r,i)=>{xPos[r.date]=P.l+(i/(allRows.length-1||1))*(W-P.l-P.r);});
    ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0f172a';ctx.font='bold 14px system-ui';ctx.textAlign='left';ctx.fillText(`${mn} 用量趋势`,P.l,22);
    for(let i=0;i<=4;i++){const v=yMin+(i/4)*(yMax-yMin),y=yS(v);ctx.strokeStyle='#e2e8f0';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();ctx.fillStyle='#64748b';ctx.font='9px system-ui';ctx.textAlign='right';ctx.fillText(v.toFixed(0),P.l-5,y+3);}
    sp.forEach(p=>{const x=xPos[p.date];ctx.strokeStyle='#cbd5e1';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,H-P.b);ctx.lineTo(x,H-P.b+4);ctx.stroke();ctx.fillStyle='#0f172a';ctx.font='bold 8px system-ui';ctx.textAlign='center';ctx.fillText(fmt(p.date),x,H-P.b+14);});
    ctx.strokeStyle='#0f172a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(P.l,H-P.b);ctx.lineTo(W-P.r,H-P.b);ctx.stroke();ctx.beginPath();ctx.moveTo(P.l,P.t);ctx.lineTo(P.l,H-P.b);ctx.stroke();
    if(sp.length>1){for(let i=0;i<sp.length-1;i++){const p1=sp[i],p2=sp[i+1],x1=xPos[p1.date],y1=yS(p1.value),x2=xPos[p2.date],y2=yS(p2.value);ctx.beginPath();if(p1.type==='stop'||p2.type==='stop'){ctx.setLineDash([5,3]);ctx.lineWidth=2;}else{ctx.setLineDash([]);ctx.lineWidth=2.5;}ctx.strokeStyle=mc;ctx.moveTo(x1,y1);ctx.lineTo(x2,y1);ctx.lineTo(x2,y2);ctx.stroke();}ctx.setLineDash([]);}
    sp.forEach(p=>{const x=xPos[p.date],y=yS(p.value);if(p.type==='stop'){ctx.fillStyle='#b91c1c';ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();ctx.beginPath();ctx.strokeStyle='white';ctx.moveTo(x-3,y-3);ctx.lineTo(x+3,y+3);ctx.moveTo(x+3,y-3);ctx.lineTo(x-3,y+3);ctx.stroke();}else if(p.type==='extension'){ctx.fillStyle='#94a3b8';ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();}else{ctx.shadowColor=mc;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);ctx.fillStyle=mc;ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();}ctx.fillStyle=p.type==='extension'?'#64748b':(p.type==='stop'?'#b91c1c':'#1e293b');ctx.font=p.type==='extension'?'7px system-ui':'bold 7px system-ui';ctx.textAlign='center';ctx.fillText(p.rawValue,x,y-12);});
}

window.downloadIndChart=id=>{const c=chartCanvases[`ind-${id}`];if(!c)return;const cfg=CONFIG_IND.find(c=>c.id===id);const a=document.createElement('a');a.download=`王坚_${cfg.name}_趋势图.png`;a.href=c.toDataURL('image/png');a.click();};
window.downloadMedChart=k=>{const c=chartCanvases[`med-chart-${k}`];if(!c)return;const a=document.createElement('a');a.download=`王坚_${CONFIG_MED[k].name}_趋势.png`;a.href=c.toDataURL('image/png');a.click();};

function renderTableHeaders(){
    const ih=document.getElementById('indTableHeader');
    if(ih){let h='<th>日期</th><th>周次</th>';CONFIG_IND.forEach(c=>{h+=`<th>${c.name}<br><small>${c.unit}</small></th>`;});ih.innerHTML=h;}
    const mh=document.getElementById('medTableHeader');
    if(mh){let h='<th>日期</th><th>周次</th>';Object.values(CONFIG_MED).forEach(m=>{h+=`<th>${m.name}</th>`;});mh.innerHTML=h;}
}

function renderTables(){
    const ib=document.getElementById('indTableBody'),mb=document.getElementById('medTableBody');
    if(!ib||!mb)return;
    ib.innerHTML='';mb.innerHTML='';
    data.forEach(row=>{
        let ir=`<tr><td>${row.date}</td><td>${row.week||'-'}</td>`;
        CONFIG_IND.forEach(c=>{const v=row[c.id];const out=v!==null&&v!==undefined&&(v<c.range[0]||v>c.range[1]);ir+=`<td style="${out?'background:#fee2e2;':''}">${v!==null&&v!==undefined?v:'-'}</td>`;});
        ib.innerHTML+=ir+'</tr>';
        let mr=`<tr><td>${row.date}</td><td>${row.week||'-'}</td>`;
        Object.keys(CONFIG_MED).forEach(k=>{const v=row.meds?.[k]||'';mr+=`<td style="${v==='停用'?'background:#fee2e2;color:#b91c1c;':''}">${v||'-'}</td>`;});
        mb.innerHTML+=mr+'</tr>';
    });
}

function gM(){return `<html><head><meta charset="UTF-8"><style>body{font-family:'Microsoft YaHei',sans-serif;padding:20px;}table{border-collapse:collapse;width:100%;}th{background:#f8fafc;border:1px solid #cbd5e1;padding:8px;}td{border:1px solid #cbd5e1;padding:6px;text-align:center;}</style></head><body><h1>王坚·肾病用药记录表</h1><p>${new Date().toLocaleString('zh-CN')}</p><table><thead><tr><th>日期</th><th>周次</th>${Object.values(CONFIG_MED).map(m=>`<th>${m.name}</th>`).join('')}</tr></thead><tbody>${data.map(r=>{let s=`<tr><td>${r.date}</td><td>${r.week||’-’}</td>`;Object.keys(CONFIG_MED).forEach(k=>{const v=r.meds?.[k]||'';s+=`<td>${v||’-’}</td>`;});return s+'</tr>';}).join('')}</tbody></table></body></html>`;}
window.exportIndToWord=()=>{const b=new Blob([gI()],{type:‘application/msword’});const a=document.createElement(‘a’);a.href=URL.createObjectURL(b);a.download=`王坚_肾病指标表_${new Date().toISOString().slice(0,10)}.doc`;a.click();};
window.exportMedToWord=()=>{const b=new Blob([gM()],{type:‘application/msword’});const a=document.createElement(‘a’);a.href=URL.createObjectURL(b);a.download=`王坚_肾病用药表_${new Date().toISOString().slice(0,10)}.doc`;a.click();};
window.exportAllToWord=()=>{const c=`<html><head><meta charset="UTF-8"><style>body{font-family:'Microsoft YaHei',sans-serif;padding:20px;}table{border-collapse:collapse;width:100%;margin-bottom:30px;}th{background:#f8fafc;border:1px solid #cbd5e1;padding:8px;}td{border:1px solid #cbd5e1;padding:6px;text-align:center;}</style></head><body><h1>王坚·肾病完整监测记录</h1><p>${new Date().toLocaleString('zh-CN')}</p><h2>一、指标记录表</h2>${gI().split('<body>')[1].split('</body>')[0]}<h2>二、用药记录表</h2>${gM().split('<body>')[1].split('</body>')[0]}</body></html>`;const b=new Blob([c],{type:‘application/msword’});const a=document.createElement(‘a’);a.href=URL.createObjectURL(b);a.download=`王坚_肾病完整记录_${new Date().toISOString().slice(0,10)}.doc`;a.click();};
window.exportCSV=()=>{const h=[‘日期’,‘周次’,…CONFIG_IND.map(i=>`${i.name}(${i.unit})`),…Object.values(CONFIG_MED).map(m=>m.name)];const r=data.map(d=>[d.date,d.week||’’,…CONFIG_IND.map(i=>d[i.id]!==null&&d[i.id]!==undefined?d[i.id]:’’),…Object.keys(CONFIG_MED).map(k=>d.meds?.[k]??’’)]);let c=h.join(’,’)+’\n’;r.forEach(row=>{c+=row.map(v=>`"${v}"`).join(’,’)+’\n’;});const b=new Blob([’\uFEFF’+c],{type:‘text/csv;charset=utf-8;’});const a=document.createElement(‘a’);a.href=URL.createObjectURL(b);a.download=‘王坚_肾病监测数据.csv’;a.click();};
window.switchTab=tab=>{[‘chartsPanel’,‘indPanel’,‘medPanel’].forEach((id,i)=>{document.getElementById(id).style.display=(i===0&&tab===‘charts’)||(i===1&&tab===‘ind’)||(i===2&&tab===‘med’)?‘block’:‘none’;});document.querySelectorAll(’.tab’).forEach((btn,i)=>{btn.classList.toggle(‘active’,(i===0&&tab===‘charts’)||(i===1&&tab===‘ind’)||(i===2&&tab===‘med’));});if(tab===‘charts’)setTimeout(()=>renderChartsByType(currentChartType),50);};
window.switchChartType=type=>{currentChartType=type;document.querySelectorAll(’.sub-tab’).forEach((b,i)=>b.classList.toggle(‘active’,(i===0&&type===‘ind’)||(i===1&&type===‘med’)));renderChartsByType(type);};
window.addEventListener(‘resize’,()=>{if(document.getElementById(‘chartsPanel’).style.display!==‘none’)renderChartsByType(currentChartType);});

renderTableHeaders();
renderTables();
renderChartsByType(‘ind’);
