<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDmfqE29qZFB9g126tWxomltJHEZhoEBDI",
        authDomain: "renal-monitor-bee0f.firebaseapp.com",
        projectId: "renal-monitor-bee0f",
        storageBucket: "renal-monitor-bee0f.firebasestorage.app",
        messagingSenderId: "827066206331",
        appId: "1:827066206331:web:062a352a8fb567f9c8bade"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "renal", "wangjian");

    window._db = db;
    window._docRef = docRef;
    window._setDoc = setDoc;
    window._onSnapshot = onSnapshot;

    // 监听云端数据变化，实时同步
    onSnapshot(docRef, (snapshot) => {
        const statusEl = document.getElementById('syncStatus');
        if (snapshot.exists()) {
            const cloudData = snapshot.data();
            if (cloudData.data) {
                data = cloudData.data;
            }
            if (cloudData.CONFIG_MED) {
                CONFIG_MED = cloudData.CONFIG_MED;
            }
            if (cloudData.CONFIG_IND) {
                // 恢复CONFIG_IND（只恢复可序列化部分）
                CONFIG_IND.forEach((cfg, i) => {
                    if (cloudData.CONFIG_IND[i]) {
                        Object.assign(cfg, cloudData.CONFIG_IND[i]);
                    }
                });
            }
            renderTableHeaders();
            renderTables();
            renderChartsByType(currentChartType);
            statusEl.className = 'sync-status synced';
            statusEl.textContent = '☁️ 已同步';
        } else {
            // 云端没有数据，上传初始数据
            saveToCloud();
            statusEl.className = 'sync-status synced';
            statusEl.textContent = '☁️ 初始化完成';
        }
    }, (error) => {
        const statusEl = document.getElementById('syncStatus');
        statusEl.className = 'sync-status error';
        statusEl.textContent = '❌ 同步失败';
        console.error(error);
    });

    window.saveToCloud = async function() {
        const statusEl = document.getElementById('syncStatus');
        statusEl.className = 'sync-status syncing';
        statusEl.textContent = '⏳ 同步中...';
        try {
            await setDoc(docRef, {
                data: data,
                CONFIG_MED: CONFIG_MED,
                CONFIG_IND: CONFIG_IND.map(c => ({
                    id: c.id, name: c.name, unit: c.unit,
                    range: c.range, color: c.color
                })),
                updatedAt: new Date().toISOString()
            });
            statusEl.className = 'sync-status synced';
            statusEl.textContent = '☁️ 已同步';
        } catch(e) {
            statusEl.className = 'sync-status error';
            statusEl.textContent = '❌ 同步失败';
        }
    };
</script>

        if (!grid) return;
        grid.innerHTML = '';
        if (type === 'ind') { CONFIG_IND.forEach(cfg => renderIndChart(cfg)); }
        else { Object.keys(CONFIG_MED).forEach(medKey => renderMedChart(medKey)); }

    function formatDateMMDD(dateStr) {
        if (!dateStr) return '';
        const parts = dateStr.split('-');
        return parts.length >= 3 ? `${parts[1]}-${parts[2]}` : dateStr;
    }

    function renderIndChart(cfg) {
        const grid = document.getElementById('chartsGrid');
        const card = document.createElement('div');
        card.className = 'chart-card';
        const validPoints = [];
        data.forEach((d, idx) => {
            if (d[cfg.id] !== null && d[cfg.id] !== undefined) {
                validPoints.push({ date: d.date, value: d[cfg.id], index: idx });
            }
        });
        const validDates = validPoints.map(p => formatDateMMDD(p.date));
        const canvasId = `chart-${cfg.id}`;
        card.innerHTML = `
            <div class="chart-header">
                <div>
                    <div class="chart-title"><span class="color-dot" style="background:${cfg.color}"></span>${cfg.name} (${cfg.unit})<span style="font-size:10px;color:#2563eb;margin-left:4px;">${validPoints.length}个点</span></div>

                </div>
                <button class="download-btn" onclick="downloadIndChart('${cfg.id}')">⬇️ 下载</button>
            </div>
            <div class="chart-container"><canvas id="${canvasId}" width="600" height="220"></canvas></div>
            <div class="date-list"><strong>日期:</strong> ${validDates.join(' · ')}</div>`;
        grid.appendChild(card);
        drawIndChart(cfg, validPoints, canvasId);
    }

    function drawIndChart(cfg, points, canvasId) {

        chartCanvases[`ind-${cfg.id}`] = canvas;

    function drawMedChart(medKey, medName, medColor, showPoints, allRows, canvasId) {

        const width = canvas.width, height = canvas.height;

        const padding = { left: 50, right: 20, top: 30, bottom: 35 };
        if (showPoints.length === 0) { ctx.fillStyle='#64748b'; ctx.font='14px system-ui'; ctx.textAlign='center'; ctx.fillText('暂无数据', width/2, height/2); return; }
        const allValues = showPoints.map(p => p.value);
        const yMin = Math.max(0, Math.floor(Math.min(...allValues) * 0.8)), yMax = Math.ceil(Math.max(...allValues) * 1.2);
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#0f172a'; ctx.font = 'bold 14px system-ui'; ctx.textAlign = 'left'; ctx.fillText(`${medName} 用量趋势`, padding.left, 22);
        ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.5;
        for (let i = 0; i <= 4; i++) {
            const val = yMin + (i / 4) * (yMax - yMin);
            const y = height - padding.bottom - ((val - yMin) / (yMax - yMin)) * (height - padding.top - padding.bottom);
            ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(width - padding.right, y); ctx.stroke();
            ctx.fillStyle = '#64748b'; ctx.font = '9px system-ui'; ctx.textAlign = 'right'; ctx.fillText(val.toFixed(0), padding.left - 5, y + 3);
        }
        const xPositions = {};
        allRows.forEach((row, i) => { xPositions[row.date] = padding.left + (i / (allRows.length - 1)) * (width - padding.left - padding.right); });
        showPoints.forEach(p => {
            const x = xPositions[p.date];
            ctx.beginPath(); ctx.moveTo(x, height - padding.bottom); ctx.lineTo(x, height - padding.bottom + 4); ctx.strokeStyle = '#cbd5e1'; ctx.stroke();
            ctx.fillStyle = '#0f172a'; ctx.font = 'bold 8px system-ui'; ctx.textAlign = 'center'; ctx.fillText(formatDateMMDD(p.date), x, height - padding.bottom + 14);
        });
        ctx.beginPath(); ctx.moveTo(padding.left, height - padding.bottom); ctx.lineTo(width - padding.right, height - padding.bottom); ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 1; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(padding.left, padding.top); ctx.lineTo(padding.left, height - padding.bottom); ctx.stroke();
        if (showPoints.length > 1) {
            for (let i = 0; i < showPoints.length - 1; i++) {
                const p1 = showPoints[i], p2 = showPoints[i + 1];
                const x1 = xPositions[p1.date], y1 = height - padding.bottom - ((p1.value - yMin) / (yMax - yMin)) * (height - padding.top - padding.bottom);
                const x2 = xPositions[p2.date], y2 = height - padding.bottom - ((p2.value - yMin) / (yMax - yMin)) * (height - padding.top - padding.bottom);
                ctx.beginPath();
                if (p1.type === 'stop' || p2.type === 'stop') { ctx.setLineDash([5, 3]); ctx.lineWidth = 2; } else { ctx.setLineDash([]); ctx.lineWidth = 2.5; }
                ctx.strokeStyle = medColor; ctx.moveTo(x1, y1); ctx.lineTo(x2, y1); ctx.lineTo(x2, y2); ctx.stroke();
            }
            ctx.setLineDash([]);
        }
        showPoints.forEach(p => {
            const x = xPositions[p.date], y = height - padding.bottom - ((p.value - yMin) / (yMax - yMin)) * (height - padding.top - padding.bottom);
            if (p.type === 'stop') {
                ctx.fillStyle = '#b91c1c'; ctx.beginPath(); ctx.arc(x, y, 4, 0, 2 * Math.PI); ctx.fill();
                ctx.strokeStyle = 'white'; ctx.lineWidth = 1.5; ctx.stroke();

            }
            ctx.fillStyle = p.type === 'extension' ? '#64748b' : (p.type === 'stop' ? '#b91c1c' : '#1e293b');
            ctx.font = p.type === 'extension' ? '7px system-ui' : 'bold 7px system-ui'; ctx.textAlign = 'center'; ctx.fillText(p.rawValue, x, y - 12);
        });
    }
